name: tee_time
description: "A new Flutter project."
publish_to: 'none'

version: 1.2.0+13

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  google_sign_in: ^6.2.2
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  geolocator: ^13.0.0
  http: ^1.2.2
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0
  screenshot: ^3.0.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  superellipse_shape: ^0.2.0
  confetti: ^0.8.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0C0E1A"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/bg_image.png
    - assets/hero.png
    - assets/golfBag.png
    - assets/round_bg.png

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Variable.ttf
