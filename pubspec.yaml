name: tee_time
description: "TeeStats — Golf round tracker and stats app."
publish_to: 'none'

version: 1.5.2+26

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.2
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  firebase_remote_config: ^5.0.0
  firebase_storage: ^12.0.0
  geolocator: ^14.0.2
  http: ^1.2.2
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0
  screenshot: ^3.0.0
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  superellipse_shape: ^0.2.0
  confetti: ^0.8.0
  shimmer: ^3.0.0
  skeletonizer: ^2.1.3
  shared_preferences: ^2.3.0
  video_player: ^2.9.2
  image_picker: ^1.1.2
  camera: ^0.11.0
  gal: ^2.3.0
  font_awesome_flutter: ^10.8.0
  flutter_svg: ^2.0.10+1
  package_info_plus: ^8.0.0
  cloud_functions: ^5.6.2
  google_generative_ai: ^0.4.7
  dart_rss: ^3.0.3
  url_launcher: ^6.3.0
  google_maps_flutter: ^2.10.0
  flutter_animate: ^4.5.2
  image_picker_ios: ^0.8.12

dependency_overrides:
  flutter_plugin_android_lifecycle: ^2.0.22
  video_player_android: ^2.9.1
  image_picker_android: ^0.8.13
  path_provider_android: ^2.2.22
  shared_preferences_android: ^2.4.0
  camera_android_camerax: ^0.6.20
  geolocator_android: ^4.6.2
  win32: ^5.0.0
  platform: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0C0E1A"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/bg_image.png
    - assets/hero.png
    - assets/golfBag.png
    - assets/login.png
    - assets/main.png

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Variable.ttf
